function openCalculator() {
  document.getElementById('calculatorModal').style.display = 'block';
}

function closeCalculator() {
  document.getElementById('calculatorModal').style.display = 'none';
}

function updateCalcFields() {
  let t = document.getElementById('calcType').value;
  let i = document.getElementById('calcInputs');
  i.innerHTML = '';
  
  if(t === 'pile') {
    i.innerHTML = `
      <input id="area" placeholder="Pile Area (m²)" style="width:100%; padding:10px; margin:10px 0; border-radius:5px; border:1px solid #38bdf8; background:#0f172a; color:#38bdf8;">
      <input id="end" placeholder="End Bearing (kN/m²)" style="width:100%; padding:10px; margin:10px 0; border-radius:5px; border:1px solid #38bdf8; background:#0f172a; color:#38bdf8;">
      <input id="friction" placeholder="Skin Friction (kN)" style="width:100%; padding:10px; margin:10px 0; border-radius:5px; border:1px solid #38bdf8; background:#0f172a; color:#38bdf8;">
    `;
  } else if(t === 'beam') {
    i.innerHTML = `
      <input id="moment" placeholder="Bending Moment (kNm)" style="width:100%; padding:10px; margin:10px 0; border-radius:5px; border:1px solid #38bdf8; background:#0f172a; color:#38bdf8;">
      <input id="depth" placeholder="Effective Depth (mm)" style="width:100%; padding:10px; margin:10px 0; border-radius:5px; border:1px solid #38bdf8; background:#0f172a; color:#38bdf8;">
    `;
  } else if(t === 'slab') {
    i.innerHTML = `
      <input id="load" placeholder="Load (kN/m²)" style="width:100%; padding:10px; margin:10px 0; border-radius:5px; border:1px solid #38bdf8; background:#0f172a; color:#38bdf8;">
      <input id="span" placeholder="Span (m)" style="width:100%; padding:10px; margin:10px 0; border-radius:5px; border:1px solid #38bdf8; background:#0f172a; color:#38bdf8;">
    `;
  } else if(t === 'foundation') {
    i.innerHTML = `
      <input id="soil" placeholder="Soil Type (soft/medium/hard)" style="width:100%; padding:10px; margin:10px 0; border-radius:5px; border:1px solid #38bdf8; background:#0f172a; color:#38bdf8;">
      <input id="floors" placeholder="Number of Floors" style="width:100%; padding:10px; margin:10px 0; border-radius:5px; border:1px solid #38bdf8; background:#0f172a; color:#38bdf8;">
    `;
  }
}

function calculateResult() {
  let t = document.getElementById('calcType').value;
  let out = document.getElementById('calcOutput');
  
  if(!t) { out.textContent = 'Please select a tool'; out.style.display = 'block'; return; }
  
  if(t === 'pile') {
    let A = +document.getElementById('area').value;
    let Qb = +document.getElementById('end').value;
    let Qs = +document.getElementById('friction').value;
    if(!A || !Qb || !Qs) { out.textContent = 'Please fill all fields'; out.style.display = 'block'; return; }
    let capacity = (A * Qb) + Qs;
    out.textContent = '✓ Pile Capacity: ' + capacity.toFixed(2) + ' kN';
  } else if(t === 'beam') {
    let M = +document.getElementById('moment').value;
    let d = +document.getElementById('depth').value;
    if(!M || !d) { out.textContent = 'Please fill all fields'; out.style.display = 'block'; return; }
    let steel = (M * 1000000) / (0.87 * 500 * d);
    out.textContent = '✓ Required Steel Area: ' + steel.toFixed(2) + ' mm²';
  } else if(t === 'slab') {
    let load = +document.getElementById('load').value;
    let span = +document.getElementById('span').value;
    if(!load || !span) { out.textContent = 'Please fill all fields'; out.style.display = 'block'; return; }
    let steel = (load * span * span) / 8;
    out.textContent = '✓ Estimated Reinforcement: ' + steel.toFixed(2) + ' kg/m²';
  } else if(t === 'foundation') {
    let soil = document.getElementById('soil').value.toLowerCase();
    let floors = +document.getElementById('floors').value;
    if(!soil || !floors) { out.textContent = 'Please fill all fields'; out.style.display = 'block'; return; }
    
    let result = '';
    if(soil === 'soft' && floors > 1) {
      result = '✓ Recommended: Pile Foundation (High Risk Soil)';
    } else if(soil === 'medium') {
      result = '✓ Recommended: Raft or Strip Foundation';
    } else if(soil === 'hard') {
      result = '✓ Recommended: Shallow Foundation';
    } else {
      result = 'More data needed for accurate recommendation';
    }
    out.textContent = result;
  }
  
  out.style.display = 'block';
}

function scrollToService(service) {
  let msg = '';
  if(service === 'piling') msg = 'Tell me about piling and deep foundations';

  else if(service === 'geotech') msg = 'Explain geotechnical engineering services';
  else if(service === 'project') msg = 'What is project management consulting?';
  sendMessage(msg);
}

let messages = [];

function renderQuickBtns() {
  const c = document.getElementById('quickBtns');
  c.innerHTML = '';
  QUICK_QUESTIONS.forEach(q => {
    const b = document.createElement('button');
    b.className = 'quick-btn text-xs px-3 py-2 rounded-lg border border-slate-700 bg-slate-800/60 text-slate-300 hover:bg-blue-600/20 hover:border-blue-500/50 hover:text-blue-300 transition-all text-left';
    b.textContent = q;
    b.onclick = () => sendMessage(q);
    c.appendChild(b);
  });
}

function formatText(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong class="text-white font-semibold">$1</strong>')
    .replace(/\n/g, '<br>');
}

function addMessage(role, text) {
  messages.push({ role, text });
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg-enter flex ' + (role === 'user' ? 'justify-end' : 'justify-start');

  if (role === 'user') {
    div.innerHTML = `<div class="max-w-[80%] bg-blue-600 text-white rounded-2xl rounded-br-md px-4 py-3 text-sm leading-relaxed">${formatText(text)}</div>`;
  } else {
    div.innerHTML = `<div class="flex gap-2.5 max-w-[90%]">
      <div class="w-7 h-7 rounded-lg bg-blue-600/20 flex items-center justify-center flex-shrink-0 mt-1">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2.2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      </div>
      <div class="bg-slate-800/80 border border-slate-700/50 rounded-2xl rounded-tl-md px-4 py-3 text-sm text-slate-200 leading-relaxed">${formatText(text)}</div>
    </div>`;
  }
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function showTyping() {
  isTyping = true;
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.id = 'typingIndicator';
  div.className = 'msg-enter flex justify-start';
  div.innerHTML = `<div class="flex gap-2.5"><div class="w-7 h-7 rounded-lg bg-blue-600/20 flex items-center justify-center flex-shrink-0 mt-1"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2.2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div><div class="bg-slate-800/80 border border-slate-700/50 rounded-2xl rounded-tl-md px-4 py-3 flex gap-1.5 items-center"><span class="w-2 h-2 rounded-full bg-blue-400 dot1"></span><span class="w-2 h-2 rounded-full bg-blue-400 dot2"></span><span class="w-2 h-2 rounded-full bg-blue-400 dot3"></span></div></div>`;
  container.appendChild(div);

}

function hideTyping() {
  isTyping = false;
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function getResponse(input) {
  const l = input.toLowerCase();
  if (l.includes('piling') || l.includes('deep foundation') || l.includes('pile type')) return KNOWLEDGE.piling;
  if (l.includes('structural') || l.includes('beam') || l.includes('column') || l.includes('design')) return KNOWLEDGE.structural;
  if (l.includes('geotech') || l.includes('soil') || l.includes('investigation') || l.includes('borehole') || l.includes('spt')) return KNOWLEDGE.geotech;
  if (l.includes('project management') || l.includes('scheduling') || l.includes('planning') || l.includes('timeline')) return KNOWLEDGE.project;
  if (l.includes('construction') || l.includes('workmanship') || l.includes('quality') || l.includes('material')) return KNOWLEDGE.construction;
  if (l.includes('cost') || l.includes('cheap') || l.includes('budget') || l.includes('save') || l.includes('reduce') || l.includes('optimize')) return KNOWLEDGE.cost;
  if (l.includes('soil safe') || l.includes('safe soil') || l.includes('testing')) return KNOWLEDGE.soil_safety;
  if (l.includes('failure') || l.includes('crack') || l.includes('settling') || l.includes('collapse') || l.includes('prevent')) return KNOWLEDGE.failure_prevention;
  if (l.includes('professional') || l.includes('advice') || l.includes('service') || l.includes('help') || l.includes('chat') || l.includes('consult')) return KNOWLEDGE.admin_chat;
  
  return `Thanks for your input! Here’s a thoughtful perspective from your engineering advisor:

**Key principles I apply:**
• Always start with proper investigation (soil testing, site assessment)
• Identify risks before they become problems
• Design for safety, efficiency, AND cost-effectiveness
• Supervise construction to ensure quality

⚠️ **Important:** Never skip the fundamentals—proper planning prevents costly problems.

💡 **My recommendation:** Describe your specific project, and I'll give you targeted advice on:
• Best foundation approach
• Required investigations
• Cost-saving opportunities
• Risk mitigation strategies

**Ready to discuss your project details?**`;
}

let followUpShown = false;

function showFollowUpBtns() {
  const qq = document.getElementById('quickQuestions');
  const btns = document.getElementById('quickBtns');
  btns.innerHTML = '';
  const followUps = [
    "🏗️ Piling & Foundations",
    "🏢 Structural Design",
    "🌍 Geotechnical Issues",
    "📋 Project Management",
    "💼 Professional Advice",
    "🧮 PAC Calculator"
  ];
  followUps.forEach(q => {
    const b = document.createElement('button');
    b.className = 'quick-btn text-xs px-3 py-2 rounded-lg border border-slate-700 bg-slate-800/60 text-slate-300 hover:bg-blue-600/20 hover:border-blue-500/50 hover:text-blue-300 transition-all text-left';
    b.textContent = q;
    if (q === "💼 Professional Advice") {
      b.onclick = () => sendMessage("I'd like professional advice for my project");
    } else if (q === "🧮 PAC Calculator") {
      b.onclick = () => openCalculator();
    } else if (q === "🏗️ Piling & Foundations") {
      b.onclick = () => sendMessage("Tell me about piling and deep foundations");
    } else if (q === "🏢 Structural Design") {
      b.onclick = () => sendMessage("What structural design services do you offer?");
    } else if (q === "🌍 Geotechnical Issues") {
      b.onclick = () => sendMessage("Explain geotechnical engineering services");
    } else if (q === "📋 Project Management") {
      b.onclick = () => sendMessage("What is project management consulting?");
    } else {
      b.onclick = () => sendMessage(q);
    }
    btns.appendChild(b);
  });
  qq.style.display = 'block';
}

function sendMessage(text) {
  if (isTyping || !text.trim()) return;
  addMessage('user', text.trim());
  document.getElementById('chatInput').value = '';
  document.getElementById('quickQuestions').style.display = 'none';

  showTyping();
  const delay = 600 + Math.random() * 800;
  setTimeout(() => {
    hideTyping();
    const response = getResponse(text);
    addMessage('assistant', response);

    // Show follow-up buttons after response
    setTimeout(() => showFollowUpBtns(), 300);
  }, delay);
}

function handleCTA() {
  sendMessage("I'd like professional advice for my project");
}

document.getElementById('chatForm').addEventListener('submit', (e) => {
  e.preventDefault();
  const input = document.getElementById('chatInput');
  sendMessage(input.value);
});
